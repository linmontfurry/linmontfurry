name: Site CI and GitHub snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "public/snake.svg"

concurrency:
  group: site-ci-main
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  snake:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: public/snake.svg?palette=github-dark

      - name: Commit snake.svg to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          commit_message: "chore: generate snake.svg [skip ci]"
          file_pattern: public/snake.svg

  pages:
    needs: snake
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull generated snake.svg
        run: git pull --ff-only origin main

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          static_site_generator: next

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
